<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURORA | Premium Audio</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Preloader (شاشة التحميل) -->
    <div id="preloader">
        <div class="loader-logo">AURORA</div>
    </div>

    <!-- Custom Cursor (مؤشر الماوس المخصص) -->
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <!-- Navigation -->
    <nav>
        <div class="logo">AURORA</div>
        <ul class="nav-links">
            <li><a href="#">Products</a></li>
            <li><a href="#">Features</a></li>
            <li><a href="#">Support</a></li>
        </ul>
        <div class="nav-actions">
            <button id="theme-toggle" class="icon-btn"><i class="fa-solid fa-sun"></i></button>
            <a href="#" class="account"><i class="fa-regular fa-user"></i> My Account</a>
            <a href="#" class="cart"><i class="fa-solid fa-cart-shopping"></i> Cart</a>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="hero">
        <div class="hero-content fade-in">
            <h4 class="accent-text">UNCOMPROMISING SOUND. DEFINED.</h4>
            <h1 id="hero-title">Experience Audio Perfection.</h1>
            <p id="hero-desc">Hybrid ANC, 50-hour battery, premium craftsmanship.</p>
            <div class="cta-buttons">
                <button class="btn-primary">SHOP NOW</button>
                <button class="btn-secondary">Learn More</button>
            </div>
        </div>
        
        <div class="hero-image fade-in">
            <!-- صورة السماعة -->
            <img src="https://images.unsplash.com/photo-1618366712010-f4ae9c647dcb?auto=format&fit=crop&w=800&q=80" alt="Aurora Pro ANC" id="product-img">
            <div class="glow-effect"></div>
        </div>
    </header>

    <!-- Features Section (سيتم تعبئتها بواسطة الجافاسكريبت) -->
    <section class="features" id="features-container"></section>

    <!-- Login Modal (نافذة تسجيل الدخول الزجاجية) -->
    <div id="login-modal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2 style="margin-bottom: 10px;">Welcome Back</h2>
            <p style="color: var(--text-muted); margin-bottom: 20px;">Sign in to your Aurora account</p>
            <form>
                <input type="email" placeholder="Email Address" required>
                <input type="password" placeholder="Password" required>
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 15px;">Login</button>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
